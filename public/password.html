<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifre Gerekli / Password Required</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --accent: #8b5cf6;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .panel {
      width: 100%;
      max-width: 400px;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid var(--border);
      padding: 2.5rem 2rem;
      border-radius: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      text-align: center;
    }
    .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }
    p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input[type="password"] {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      padding: 0.85rem 1rem;
      border-radius: 10px;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }
    button {
      background: var(--accent);
      border: none;
      color: #ffffff;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
      transition: filter 0.2s;
    }
    button:hover {
      filter: brightness(1.1);
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="icon">🔒</div>
    <h1 id="lbl-title">Şifre Gerekli</h1>
    <p id="lbl-desc">Bu bağlantı şifre korumalıdır. Lütfen devam etmek için şifreyi girin.</p>
    
    <form id="pw-form" action="" method="GET">
      <input type="password" name="pw" id="pw-input" required autofocus>
      <button type="submit" id="lbl-btn">Doğrula & İlerle</button>
    </form>
    
    <div class="footer">
      <p><span id="lbl-footer">Bağlantı altyapısı</span> <a href="/">QRAurify</a></p>
    </div>
  </div>

  <script>
    const lang = navigator.language.startsWith('tr') ? 'tr' : 'en';
    const content = {
      tr: {
        title: 'Şifre Gerekli',
        desc: 'Bu bağlantı şifre korumalıdır. Devam etmek için lütfen şifreyi girin.',
        btn: 'Doğrula & İlerle',
        footer: 'Bağlantı altyapısı'
      },
      en: {
        title: 'Password Required',
        desc: 'This link is password protected. Please enter the password to continue.',
        btn: 'Verify & Proceed',
        footer: 'Powered by'
      }
    }[lang];

    document.getElementById('lbl-title').innerText = content.title;
    document.getElementById('lbl-desc').innerText = content.desc;
    document.getElementById('lbl-btn').innerText = content.btn;
    document.getElementById('lbl-footer').innerText = content.footer;

    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    if (code) {
      document.getElementById('pw-form').action = `/r/${code}`;
    }
  </script>
</body>
</html>

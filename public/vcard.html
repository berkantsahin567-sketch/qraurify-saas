<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dijital Kartvizit / Contact Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --accent: #8b5cf6;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .profile-card {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .cover-header {
      height: 120px;
      background: linear-gradient(135deg, var(--accent) 0%, #4c1d95 100%);
      position: relative;
    }
    .avatar-wrapper {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--bg);
      border: 4px solid var(--card-bg);
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-info {
      margin-top: 60px;
      padding: 1.5rem;
      text-align: center;
    }
    .profile-name {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.025em;
    }
    .profile-title {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      font-weight: 500;
    }
    .profile-company {
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn-save {
      background: var(--accent);
      color: #ffffff;
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.3);
      transition: filter 0.2s, transform 0.2s;
      text-decoration: none;
      margin-bottom: 1.5rem;
    }
    .btn-save:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-align: left;
    }
    .contact-link-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border);
      padding: 0.85rem 1.25rem;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: background-color 0.2s, border-color 0.2s;
    }
    .contact-link-row:hover {
      background: rgba(15, 23, 42, 0.7);
      border-color: var(--accent);
    }
    .link-icon {
      font-size: 1.25rem;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .link-data {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .link-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.15rem;
    }
    .link-val {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .social-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .social-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      font-size: 1.2rem;
      transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
    }
    .social-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      transform: translateY(-2px);
    }
    .error-wrapper {
      padding: 3rem 2rem;
      text-align: center;
    }
    .error-wrapper h2 {
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="profile-card" id="card-panel" style="display: none;">
    <div class="cover-header" id="cover-bg">
      <div class="avatar-wrapper" id="avatar-container">
        <!-- Image or Letter -->
      </div>
    </div>
    <div class="profile-info">
      <h2 class="profile-name" id="prof-name">John Doe</h2>
      <div class="profile-title" id="prof-title">Software Developer</div>
      <div class="profile-company" id="prof-company">Acme Corp</div>
      
      <button onclick="saveVcard()" class="btn-save" id="lbl-btn-save">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <span id="lbl-save-text">Rehbere Ekle</span>
      </button>

      <div class="links-grid" id="links-container">
        <!-- Link rows populated dynamically -->
      </div>

      <div class="social-row" id="socials-container" style="display: none;">
        <!-- Social buttons -->
      </div>
    </div>
  </div>

  <div class="profile-card error-wrapper" id="error-panel" style="display: none;">
    <h2 id="err-title">Hata</h2>
    <p id="err-desc">Profil bilgileri yüklenemedi.</p>
  </div>

  <script>
    const lang = navigator.language.startsWith('tr') ? 'tr' : 'en';
    const dict = {
      tr: {
        save: 'Rehbere Ekle',
        phone: 'Telefon',
        email: 'E-Posta',
        web: 'Web Sitesi',
        address: 'Adres',
        errTitle: 'Hata',
        errDesc: 'Profil bilgileri bulunamadı veya bağlantı yapılandırılmamış.'
      },
      en: {
        save: 'Add to Contacts',
        phone: 'Phone',
        email: 'Email',
        web: 'Website',
        address: 'Address',
        errTitle: 'Error',
        errDesc: 'Profile contact details could not be found or are not configured.'
      }
    }[lang];

    document.getElementById('lbl-save-text').innerText = dict.save;

    let vcardDetails = null;

    async function loadVcardData() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (!code) {
        showError();
        return;
      }

      try {
        const res = await fetch(`/api/qr/public-vcard/${code}`);
        if (!res.ok) throw new Error();

        const data = await res.json();
        vcardDetails = data.vcardData;

        // Apply customization styles
        if (data.brandColor) {
          document.documentElement.style.setProperty('--accent', data.brandColor);
          document.getElementById('cover-bg').style.background = `linear-gradient(135deg, ${data.brandColor} 0%, #1e1b4b 100%)`;
        }

        // Render avatar logo/image
        const avatarBox = document.getElementById('avatar-container');
        if (data.logoUrl) {
          avatarBox.innerHTML = `<img src="${data.logoUrl}" alt="Logo">`;
        } else {
          avatarBox.innerText = (vcardDetails.name || 'C').substring(0, 1).toUpperCase();
        }

        // Set text values
        document.getElementById('prof-name').innerText = vcardDetails.name || '';
        document.getElementById('prof-title').innerText = vcardDetails.title || '';
        document.getElementById('prof-company').innerText = vcardDetails.company || '';

        if (!vcardDetails.title) document.getElementById('prof-title').style.display = 'none';
        if (!vcardDetails.company) document.getElementById('prof-company').style.display = 'none';

        // Render primary contact links
        const linksBox = document.getElementById('links-container');
        linksBox.innerHTML = '';

        if (vcardDetails.phone) {
          linksBox.innerHTML += `
            <a href="tel:${vcardDetails.phone}" class="contact-link-row">
              <span class="link-icon">📞</span>
              <span class="link-data">
                <span class="link-label">${dict.phone}</span>
                <span class="link-val">${vcardDetails.phone}</span>
              </span>
            </a>
          `;
        }

        if (vcardDetails.email) {
          linksBox.innerHTML += `
            <a href="mailto:${vcardDetails.email}" class="contact-link-row">
              <span class="link-icon">✉️</span>
              <span class="link-data">
                <span class="link-label">${dict.email}</span>
                <span class="link-val">${vcardDetails.email}</span>
              </span>
            </a>
          `;
        }

        if (vcardDetails.website) {
          let cleanWeb = vcardDetails.website;
          if (!/^https?:\/\//i.test(cleanWeb)) {
            cleanWeb = 'https://' + cleanWeb;
          }
          linksBox.innerHTML += `
            <a href="${cleanWeb}" target="_blank" class="contact-link-row">
              <span class="link-icon">🌐</span>
              <span class="link-data">
                <span class="link-label">${dict.web}</span>
                <span class="link-val">${vcardDetails.website}</span>
              </span>
            </a>
          `;
        }

        if (vcardDetails.address) {
          linksBox.innerHTML += `
            <div class="contact-link-row" style="cursor: default;">
              <span class="link-icon">📍</span>
              <span class="link-data">
                <span class="link-label">${dict.address}</span>
                <span class="link-val" style="white-space: normal; overflow: visible; text-overflow: unset;">${vcardDetails.address}</span>
              </span>
            </div>
          `;
        }

        // Render socials
        const socialsBox = document.getElementById('socials-container');
        socialsBox.innerHTML = '';
        let hasSocials = false;

        const socials = [
          { key: 'instagram', icon: '📸', prefix: 'https://instagram.com/' },
          { key: 'facebook', icon: '👥', prefix: 'https://facebook.com/' },
          { key: 'linkedin', icon: '💼', prefix: 'https://linkedin.com/in/' },
          { key: 'twitter', icon: '🐦', prefix: 'https://twitter.com/' }
        ];

        socials.forEach(s => {
          const handle = vcardDetails[s.key];
          if (handle && handle.trim()) {
            hasSocials = true;
            let finalUrl = handle.trim();
            if (!/^https?:\/\//i.test(finalUrl)) {
              finalUrl = s.prefix + finalUrl.replace(/^@/, '');
            }
            socialsBox.innerHTML += `
              <a href="${finalUrl}" target="_blank" class="social-btn" title="${s.key}">
                ${s.icon}
              </a>
            `;
          }
        });

        if (hasSocials) {
          socialsBox.style.display = 'flex';
        }

        document.getElementById('card-panel').style.display = 'flex';

      } catch (err) {
        showError();
      }
    }

    function showError() {
      document.getElementById('err-title').innerText = dict.errTitle;
      document.getElementById('err-desc').innerText = dict.errDesc;
      document.getElementById('error-panel').style.display = 'block';
    }

    function saveVcard() {
      if (!vcardDetails) return;

      let vcf = 'BEGIN:VCARD\n' +
                'VERSION:3.0\n' +
                'FN:' + (vcardDetails.name || '') + '\n' +
                'ORG:' + (vcardDetails.company || '') + '\n' +
                'TITLE:' + (vcardDetails.title || '') + '\n' +
                'TEL;TYPE=CELL,VOICE:' + (vcardDetails.phone || '') + '\n' +
                'EMAIL;TYPE=PREF,INTERNET:' + (vcardDetails.email || '') + '\n' +
                'URL:' + (vcardDetails.website || '') + '\n' +
                'ADR;TYPE=WORK:;;' + (vcardDetails.address || '') + '\n' +
                'END:VCARD';

      const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = (vcardDetails.name || 'contact').replace(/\s+/g, '_') + '.vcf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    loadVcardData();
  </script>
</body>
</html>
